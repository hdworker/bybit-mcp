version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-deps:
        patterns:
          - "httpx"
          - "fastmcp"
          - "pydantic"
          - "python-dotenv"
      dev-deps:
        patterns:
          - "pytest*"
          - "respx"
          - "ruff"
